# P-E1b — YOLOE-26s, prompts cortos (helmet/vest), threshold=0.15
run:
  scenario: DBE
  name: p_e1b_yoloe_short_15
  description: "P-E1b: YOLOE-26s con vocabulario corto v2, threshold 0.15"

source:
  ref: dataset_v1

model:
  ref: yoloe/yoloe-26s
  device: cuda
  confidence_threshold: 0.15

prompts:
  ref: cr01_cr02_v2_short
  active_ids: [person, helmet, vest]

postprocess:
  min_confidence: 0.15

outputs:
  preview_max: 37
