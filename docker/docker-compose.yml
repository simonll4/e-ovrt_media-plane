# Despliegue de dos nodos del plano de medios.
# Nodo A (edge) y Nodo B (GPU) comparten una red puente para el canal ZeroMQ.
services:
  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node-a
    networks: [media-plane]
    volumes:
      - ../configs:/configs:ro
    # Nodo A expone el REP server; two_node_a.yaml debe bindear 0.0.0.0:5555.
    expose: ["5555"]

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node-b
    networks: [media-plane]
    volumes:
      - ../configs:/configs:ro
      - ../models:/app/models:ro
      - ../runs:/app/runs
    depends_on: [node-a]
    # two_node_b.yaml debe conectar a tcp://node-a:5555.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  media-plane:
    driver: bridge
